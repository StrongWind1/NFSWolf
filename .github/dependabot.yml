version: 2
updates:
  # Keep GitHub Actions pinned SHAs up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # Keep Cargo dependencies up to date.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch
    # Major bumps get opened as individual PRs for explicit review rather than
    # disappearing into a batched update.
    open-pull-requests-limit: 10
