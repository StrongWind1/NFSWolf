# =============================================================================
# codeql.yml -- GitHub CodeQL Advanced static analysis.
#
# Analyzes both the GitHub Actions workflow files and the Rust source code.
# Rust uses build-mode: none (CodeQL's auto-build handles Rust without a
# manual cargo invocation).
#
# WHEN THINGS RUN
#   push to main      -> analysis on every merge.
#   pull request      -> analysis on every PR so findings block merges.
#   weekly (Saturday) -> catches new CodeQL rules against existing code.
#   workflow_dispatch -> manual re-trigger from the Actions tab.
# =============================================================================

name: CodeQL Advanced

run-name: "CodeQL -- ${{ github.event.head_commit.message || github.ref_name }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '19 6 * * 6'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: rust
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"
