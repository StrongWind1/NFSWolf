[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 3

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = [ "https://github.com/rustsec/advisory-db" ]
ignore = [ ]
maximum-db-staleness = "P1D"
git-fetch-with-cli = true
unmaintained = "all"
unsound = "all"
unused-ignored-advisory = "deny"
yanked = "deny"

[licenses]
allow = [ "Apache-2.0", "MIT", "Unicode-3.0", "BSL-1.0", "MPL-2.0", "Unlicense" ]
unused-allowed-license = "deny"
confidence-threshold = 0.95

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"

# Transitive duplicates we cannot resolve -- different direct deps pin
# incompatible major versions of the same crate.
#   hashbrown: dashmap 6.x -> 0.14, indexmap 2.x (via fuser) -> 0.17
#   nix:       fuser -> 0.30, rustyline -> 0.31
skip = [
    { crate = "hashbrown@0.14", reason = "dashmap 6.x has not upgraded to hashbrown 0.17" },
    { crate = "nix@0.30", reason = "fuser has not upgraded to nix 0.31" },
    { crate = "syn@2", reason = "proc-macro crates have not all upgraded to syn 3" },
]

[[bans.deny]]
crate = "openssl"
wrappers = [ ]

[[bans.deny]]
crate = "openssl-sys"
wrappers = [ ]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [ "https://github.com/rust-lang/crates.io-index" ]
allow-git = [ ]

[sources.allow-org]
github = [ ]
gitlab = [ ]
bitbucket = [ ]
